<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    />
    <meta name="referrer" content="same-origin" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Completing sign-in...</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff7f8;
        color: #1e293b;
        font: 600 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      p {
        margin: 0;
        padding: 1rem 1.25rem;
        border: 1px solid #fecdd3;
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body>
    <p>Finishing your Sparkle Bows sign-in...</p>
    <script>
      (function () {
        var search = window.location.search || "";

        try {
          if (search) {
            window.sessionStorage.setItem("sparklebows.oauth.result", search);
          }
        } catch (error) {}

        var destination = search ? "/?oauth_return=1" : "/";
        window.location.replace(destination);
      })();
    </script>
  </body>
</html>
